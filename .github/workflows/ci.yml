name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm test

      - name: Cross-validation (TA-Lib compatibility)
        if: matrix.node-version == 22
        run: cd packages/core && pnpm test:crossval

      - name: Bundle size check (core)
        if: matrix.node-version == 22
        run: cd packages/core && pnpm exec size-limit

      - name: Bundle size check (chart)
        if: matrix.node-version == 22
        run: cd packages/chart && pnpm size-check

      - name: Build chart examples
        if: matrix.node-version == 22
        run: |
          cd packages/chart/examples/simple-chart && pnpm install --ignore-workspace && pnpm build
          cd ../simple-react-chart && pnpm install --ignore-workspace && pnpm build
          cd ../simple-vue-chart && pnpm install --ignore-workspace && pnpm build
          cd ../indicator-showcase && pnpm install --ignore-workspace && pnpm build
