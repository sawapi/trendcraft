<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendCraft Chart Viewer</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="container">
    <h1>TrendCraft Chart Viewer</h1>

    <!-- Drop Zone -->
    <div class="drop-zone" id="dropZone">
      <p>Drag & drop CSV file or click to select</p>
      <p class="file-info" id="fileInfo"></p>
      <input type="file" id="fileInput" accept=".csv" style="display: none;">
    </div>

    <!-- Controls -->
    <div class="controls" id="controls">
      <div class="control-group">
        <label>Timeframe</label>
        <select id="timeframe">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
      </div>

      <div class="control-group">
        <label>Indicators</label>
        <div class="indicators">
          <label class="indicator-item sma">
            <input type="checkbox" data-indicator="sma5"> SMA 5
          </label>
          <label class="indicator-item sma">
            <input type="checkbox" data-indicator="sma25"> SMA 25
          </label>
          <label class="indicator-item sma">
            <input type="checkbox" data-indicator="sma75"> SMA 75
          </label>
          <label class="indicator-item ema">
            <input type="checkbox" data-indicator="ema12"> EMA 12
          </label>
          <label class="indicator-item ema">
            <input type="checkbox" data-indicator="ema26"> EMA 26
          </label>
          <label class="indicator-item bb">
            <input type="checkbox" data-indicator="bb"> Bollinger Bands
          </label>
          <label class="indicator-item rsi">
            <input type="checkbox" data-indicator="rsi"> RSI 14
          </label>
          <label class="indicator-item macd">
            <input type="checkbox" data-indicator="macd"> MACD
          </label>
          <label class="indicator-item stoch">
            <input type="checkbox" data-indicator="stoch"> Stochastics
          </label>
          <label class="indicator-item dmi">
            <input type="checkbox" data-indicator="dmi"> DMI/ADX
          </label>
          <label class="indicator-item stochrsi">
            <input type="checkbox" data-indicator="stochrsi"> Stoch RSI
          </label>
          <label class="indicator-item mfi">
            <input type="checkbox" data-indicator="mfi"> MFI
          </label>
          <label class="indicator-item obv">
            <input type="checkbox" data-indicator="obv"> OBV
          </label>
          <label class="indicator-item donchian">
            <input type="checkbox" data-indicator="donchian"> Donchian
          </label>
          <label class="indicator-item wma">
            <input type="checkbox" data-indicator="wma20"> WMA 20
          </label>
          <label class="indicator-item ichimoku">
            <input type="checkbox" data-indicator="ichimoku"> Ichimoku
          </label>
          <label class="indicator-item supertrend">
            <input type="checkbox" data-indicator="supertrend"> Supertrend
          </label>
          <label class="indicator-item cci">
            <input type="checkbox" data-indicator="cci"> CCI
          </label>
          <label class="indicator-item willr">
            <input type="checkbox" data-indicator="willr"> Williams %R
          </label>
          <label class="indicator-item roc">
            <input type="checkbox" data-indicator="roc"> ROC
          </label>
          <label class="indicator-item cross">
            <input type="checkbox" data-indicator="cross"> GC/DC
          </label>
          <label class="indicator-item perfectorder">
            <input type="checkbox" data-indicator="perfectorder"> Perfect Order
          </label>
          <label class="indicator-item rangebound">
            <input type="checkbox" data-indicator="rangebound"> Range-Bound
          </label>
          <label class="indicator-item psar">
            <input type="checkbox" data-indicator="psar"> Parabolic SAR
          </label>
          <label class="indicator-item keltner">
            <input type="checkbox" data-indicator="keltner"> Keltner Channel
          </label>
          <label class="indicator-item cmf">
            <input type="checkbox" data-indicator="cmf"> CMF
          </label>
          <label class="indicator-item volume-anomaly">
            <input type="checkbox" data-indicator="volumeAnomaly"> Volume Anomaly
          </label>
          <label class="indicator-item volume-profile">
            <input type="checkbox" data-indicator="volumeProfile"> Volume Profile
          </label>
          <label class="indicator-item volume-trend">
            <input type="checkbox" data-indicator="volumeTrend"> Volume Trend
          </label>
        </div>
      </div>
    </div>

    <!-- Backtest Panel -->
    <div class="backtest-panel" id="backtestPanel">
      <h2>Backtest Simulator</h2>

      <div class="backtest-controls">
        <!-- Condition Selection -->
        <div class="condition-row">
          <div class="condition-group">
            <label>Entry Condition</label>
            <select id="entryCondition">
              <optgroup label="Moving Average">
                <option value="gc">Golden Cross (5/25)</option>
                <option value="validatedGc">Validated GC (騙し検出)</option>
                <option value="gcVolume">GC + Volume</option>
              </optgroup>
              <optgroup label="RSI">
                <option value="rsi30">RSI &lt; 30 (売られすぎ)</option>
                <option value="rsi40">RSI &lt; 40</option>
              </optgroup>
              <optgroup label="MACD">
                <option value="macdUp">MACD Cross Up</option>
                <option value="macdRsi">MACD + RSI &lt; 50</option>
              </optgroup>
              <optgroup label="Stochastics">
                <option value="stoch20">Stoch %K &lt; 20 (売られすぎ)</option>
                <option value="stochCrossUp">Stoch GC (%K&gt;%D)</option>
                <option value="stochOversoldCross">Stoch 売られすぎ + GC</option>
              </optgroup>
              <optgroup label="DMI/ADX">
                <option value="dmiBullish">DMI Bullish (+DI&gt;-DI)</option>
                <option value="dmiBullishStrong">DMI + ADX強トレンド</option>
              </optgroup>
              <optgroup label="Perfect Order">
                <option value="poBullish">PO Bullish (レガシー)</option>
                <option value="poPlus">PO+ (確定シグナル)</option>
                <option value="pb">PB (押し目買い)</option>
                <option value="poPlusPb">PO+ or PB (統合)</option>
                <option value="poRsi">PO+ + RSI &lt; 60</option>
              </optgroup>
              <optgroup label="Bollinger Bands">
                <option value="bbLower">BB Lower Touch</option>
              </optgroup>
              <optgroup label="Range-Bound">
                <option value="rbBreakout">Range Breakout</option>
                <option value="notInRange">Not In Range (Filter)</option>
              </optgroup>
              <optgroup label="Combined Strategies (推奨)">
                <option value="rbVolAnomaly">RangeBreak + VolAnomaly</option>
                <option value="rbVolTrend">RangeBreak + VolTrend ★</option>
                <option value="rbPoVol">RangeBreak + PO + Volume</option>
              </optgroup>
              <optgroup label="Volume Only">
                <option value="volAnomaly">Volume Anomaly</option>
                <option value="volTrend">Volume Trend</option>
                <option value="volAbove15">Volume &gt; 1.5x Avg</option>
              </optgroup>
              <optgroup label="Best Strategy (最適化済み)">
                <option value="gcVolAnomaly">GC + VolAnomaly ★★</option>
                <option value="stochVolAbove15">Stoch↑ + Vol&gt;1.5x ★</option>
              </optgroup>
              <optgroup label="ATR% Filter (高ボラ銘柄のみ)">
                <option value="atrGcVolAnomaly">ATR&gt;2.3% + GC + VolAnomaly ★★★</option>
                <option value="atrGc">ATR&gt;2.3% + GC</option>
              </optgroup>
            </select>
          </div>
          <div class="condition-group">
            <label>Exit Condition</label>
            <select id="exitCondition">
              <optgroup label="Moving Average">
                <option value="dc">Dead Cross (5/25)</option>
                <option value="validatedDc">Validated DC (騙し検出)</option>
              </optgroup>
              <optgroup label="RSI">
                <option value="rsi70">RSI &gt; 70 (買われすぎ)</option>
                <option value="rsi60">RSI &gt; 60</option>
              </optgroup>
              <optgroup label="MACD">
                <option value="macdDown">MACD Cross Down</option>
              </optgroup>
              <optgroup label="Stochastics">
                <option value="stoch80">Stoch %K &gt; 80 (買われすぎ)</option>
                <option value="stochCrossDown">Stoch DC (%K&lt;%D)</option>
                <option value="stochOverboughtCross">Stoch 買われすぎ + DC</option>
              </optgroup>
              <optgroup label="DMI/ADX">
                <option value="dmiBearish">DMI Bearish (-DI&gt;+DI)</option>
              </optgroup>
              <optgroup label="Perfect Order">
                <option value="poCollapsed">PO Collapsed (レガシー)</option>
                <option value="poBreakdown">PO BD (崩壊検出)</option>
              </optgroup>
              <optgroup label="Bollinger Bands">
                <option value="bbUpper">BB Upper Touch</option>
              </optgroup>
              <optgroup label="Range-Bound">
                <option value="rbForming">Range Forming</option>
                <option value="inRange">In Range (Exit Trend)</option>
              </optgroup>
              <optgroup label="Combined Exit (推奨)">
                <option value="rbExitCombo">InRange or Confirmed ★</option>
                <option value="poCollapseOrRange">PO Collapse or InRange</option>
              </optgroup>
              <optgroup label="ATR Stop">
                <option value="atrStop15">ATR Stop 1.5x</option>
                <option value="atrStop20">ATR Stop 2.0x</option>
                <option value="atrStop25">ATR Stop 2.5x</option>
                <option value="atrStop30">ATR Stop 3.0x</option>
              </optgroup>
              <optgroup label="Combined + ATR (推奨)">
                <option value="rbExitAtr">InRange/Confirmed + ATR 2x ★</option>
              </optgroup>
              <optgroup label="Best Strategy (最適化済み)">
                <option value="macdVolDiv">MACD↓ + VolDiv ★★</option>
              </optgroup>
            </select>
          </div>
        </div>

        <!-- Parameters -->
        <div class="param-row">
          <div class="param-group">
            <label>Capital</label>
            <input type="number" id="capital" value="1000000">
          </div>
          <div class="param-group">
            <label>Stop Loss (%)</label>
            <input type="number" id="stopLoss" value="5">
          </div>
          <div class="param-group">
            <label>Take Profit (%)</label>
            <input type="number" id="takeProfit" value="" placeholder="None">
          </div>
          <div class="param-group">
            <label>Trailing Stop (%)</label>
            <input type="number" id="trailingStop" value="" placeholder="None">
          </div>
        </div>

        <!-- ATR Trailing Stop -->
        <div class="param-row">
          <div class="param-group">
            <label>ATR Trail (×ATR)</label>
            <input type="number" id="atrTrailMultiplier" value="" placeholder="None" step="0.5">
          </div>
          <div class="param-group">
            <label>ATR Period</label>
            <input type="number" id="atrTrailPeriod" value="14">
          </div>
        </div>

        <!-- Partial Take Profit -->
        <div class="param-row">
          <div class="param-group">
            <label>Partial Take @ (%)</label>
            <input type="number" id="partialThreshold" value="" placeholder="None">
          </div>
          <div class="param-group">
            <label>Sell (%)</label>
            <input type="number" id="partialSellPercent" value="50">
          </div>
        </div>

        <!-- Cost & Date Settings -->
        <div class="param-row">
          <div class="param-group">
            <label>Start Date</label>
            <input type="date" id="startDate" value="2015-01-01">
          </div>
          <div class="param-group">
            <label>Commission (%)</label>
            <input type="number" id="commissionRate" value="0.1" step="0.01">
          </div>
          <div class="param-group">
            <label>Tax Rate (%)</label>
            <input type="number" id="taxRate" value="20.315" step="0.001">
          </div>
        </div>

        <button id="runBacktest">Run Backtest</button>
      </div>

      <!-- Results Summary -->
      <div class="backtest-results" id="backtestResults">
        <div class="metric"><label>Total Return</label><span id="resultReturn">-</span></div>
        <div class="metric"><label>Win Rate</label><span id="resultWinRate">-</span></div>
        <div class="metric"><label>Trades</label><span id="resultTrades">-</span></div>
        <div class="metric"><label>Max DD</label><span id="resultDD">-</span></div>
        <div class="metric"><label>Sharpe</label><span id="resultSharpe">-</span></div>
        <div class="metric"><label>PF</label><span id="resultPF">-</span></div>
      </div>
    </div>

    <!-- Charts -->
    <div class="chart-wrapper" id="chartWrapper">
      <div id="main-chart"></div>
      <div id="rsi-chart" class="sub-chart"></div>
      <div id="macd-chart" class="sub-chart"></div>
      <div id="stoch-chart" class="sub-chart"></div>
      <div id="dmi-chart" class="sub-chart"></div>
      <div id="stochrsi-chart" class="sub-chart"></div>
      <div id="mfi-chart" class="sub-chart"></div>
      <div id="obv-chart" class="sub-chart"></div>
      <div id="cci-chart" class="sub-chart"></div>
      <div id="willr-chart" class="sub-chart"></div>
      <div id="roc-chart" class="sub-chart"></div>
      <div id="rb-chart" class="sub-chart"></div>
      <div id="cmf-chart" class="sub-chart"></div>
      <div id="volume-anomaly-chart" class="sub-chart"></div>
      <div id="volume-profile-chart" class="sub-chart"></div>
      <div id="volume-trend-chart" class="sub-chart"></div>
      <div id="cross-events" class="cross-events">
        <h3>GC/DC Events (SMA 5×25)</h3>
        <div id="cross-events-list" class="cross-events-list"></div>
      </div>
      <div id="perfect-order-events" class="perfect-order-events">
        <h3>Perfect Order Events (SMA 5×25×75)</h3>
        <div id="perfect-order-events-list" class="perfect-order-events-list"></div>
      </div>
      <div id="range-bound-events" class="range-bound-events">
        <h3>Range-Bound Events (ADX/BB/Donchian)</h3>
        <div id="range-bound-events-list" class="range-bound-events-list"></div>
      </div>

      <!-- Equity Curve Chart -->
      <div id="equity-chart"></div>

      <!-- Trades Table -->
      <div class="trades-panel" id="tradesPanel">
        <h3>Trade History</h3>
        <div id="tradesTable"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
