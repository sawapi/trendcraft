<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@trendcraft/chart — Simple Chart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0e17;
      color: #d1d4dc;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: #131722;
      border-bottom: 1px solid #2a2e39;
    }
    header h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
    header .tag {
      font-size: 10px;
      background: #2196F3;
      color: #fff;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .controls {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    button {
      padding: 4px 8px;
      font-size: 11px;
      background: #1e222d;
      color: #d1d4dc;
      border: 1px solid #2a2e39;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #2a2e39; }
    button.active { background: #2196F3; color: #fff; border-color: #2196F3; }
    .btn-group {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .btn-group + .btn-group {
      margin-left: 4px;
      padding-left: 8px;
      border-left: 1px solid #2a2e39;
    }
    .btn-group-label {
      font-size: 9px;
      color: #787b86;
      white-space: nowrap;
      margin-right: 2px;
    }
    #chart-container {
      flex: 1;
      min-height: 0;
    }
    .status {
      padding: 6px 12px;
      font-size: 10px;
      color: #787b86;
      background: #131722;
      border-top: 1px solid #2a2e39;
    }
    @media (max-width: 768px) {
      .btn-group + .btn-group { padding-left: 4px; margin-left: 2px; }
    }
    @media (max-width: 600px) {
      header h1 { font-size: 12px; }
      header .tag { display: none; }
      .controls { margin-left: 0; width: 100%; justify-content: center; }
      button { padding: 6px 10px; font-size: 12px; }
      .btn-group-label { display: none; }
      .btn-group + .btn-group { border-left: none; padding-left: 0; margin-left: 0; }
    }
    @media (max-width: 480px) {
      button { padding: 8px 12px; font-size: 13px; min-height: 44px; }
      .btn-group { gap: 2px; }
      .controls { gap: 2px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>@trendcraft/chart</h1>
    <span class="tag">Simple Chart Example</span>
    <div class="controls">
      <div class="btn-group">
        <span class="btn-group-label">Indicators</span>
        <button id="btn-sma" class="active">SMA 20</button>
        <button id="btn-bb">Bollinger Bands</button>
        <button id="btn-ichimoku">Ichimoku</button>
        <button id="btn-rsi">RSI</button>
        <button id="btn-macd">MACD</button>
      </div>
      <div class="btn-group">
        <span class="btn-group-label">Draw</span>
        <button id="btn-hline">H-Line</button>
        <button id="btn-vline">V-Line</button>
        <button id="btn-hray">H-Ray</button>
        <button id="btn-ray">Ray</button>
        <button id="btn-arrow">Arrow</button>
        <button id="btn-rect">Rectangle</button>
        <button id="btn-channel">Channel</button>
        <button id="btn-fib">Fibonacci</button>
        <button id="btn-fib-ext">Fib Extension</button>
        <button id="btn-text">Text</button>
      </div>
      <div class="btn-group">
        <span class="btn-group-label">Analysis</span>
        <button id="btn-backtest">Backtest</button>
        <button id="btn-score">Score</button>
      </div>
      <div class="btn-group">
        <span class="btn-group-label">Plugins</span>
        <button id="btn-plugin-sr">S/R Zones</button>
        <button id="btn-plugin-trail">Trail</button>
        <button id="btn-regime">Regime</button>
        <button id="btn-smc">SMC</button>
      </div>
      <div class="btn-group">
        <span class="btn-group-label">Range</span>
        <button id="btn-range-1m">1M</button>
        <button id="btn-range-3m">3M</button>
        <button id="btn-range-6m">6M</button>
        <button id="btn-range-ytd">YTD</button>
        <button id="btn-range-1y">1Y</button>
        <button id="btn-range-all" class="active">All</button>
      </div>
      <div class="btn-group">
        <span class="btn-group-label">Display</span>
        <button id="btn-vol-overlay">Vol Overlay</button>
        <button id="btn-chart-type">Chart: Candle</button>
        <button id="btn-simulate">Simulate</button>
        <button id="btn-fit">Fit All</button>
        <button id="btn-theme">Light Theme</button>
      </div>
    </div>
  </header>
  <div id="chart-container"></div>
  <div class="status" id="status">Loading data...</div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
