<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@trendcraft/chart — Simple Chart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0e17;
      color: #d1d4dc;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: #131722;
      border-bottom: 1px solid #2a2e39;
    }
    header h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
    header .tag {
      font-size: 10px;
      background: #2196F3;
      color: #fff;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .controls {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    button {
      padding: 4px 8px;
      font-size: 11px;
      background: #1e222d;
      color: #d1d4dc;
      border: 1px solid #2a2e39;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #2a2e39; }
    button.active { background: #2196F3; color: #fff; border-color: #2196F3; }
    #chart-container {
      flex: 1;
      min-height: 0;
    }
    .status {
      padding: 6px 12px;
      font-size: 10px;
      color: #787b86;
      background: #131722;
      border-top: 1px solid #2a2e39;
    }
    @media (max-width: 600px) {
      header h1 { font-size: 12px; }
      header .tag { display: none; }
      .controls { margin-left: 0; width: 100%; justify-content: center; }
      button { padding: 6px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>@trendcraft/chart</h1>
    <span class="tag">Simple Chart Example</span>
    <div class="controls">
      <button id="btn-sma" class="active">SMA 20</button>
      <button id="btn-bb">Bollinger Bands</button>
      <button id="btn-ichimoku">Ichimoku</button>
      <button id="btn-rsi">RSI</button>
      <button id="btn-macd">MACD</button>
      <button id="btn-hline">H-Line</button>
      <button id="btn-fib">Fibonacci</button>
      <button id="btn-fit">Fit All</button>
      <button id="btn-theme">Light Theme</button>
    </div>
  </header>
  <div id="chart-container"></div>
  <div class="status" id="status">Loading data...</div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
